name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: pip install clang-format==22.1.2
      - name: Check formatting
        run: make format-check

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install llvm-mingw
        run: |
          VERSION=20260407
          TARBALL=llvm-mingw-${VERSION}-msvcrt-ubuntu-22.04-x86_64.tar.xz
          curl -sSL -o "$TARBALL" "https://github.com/mstorsjo/llvm-mingw/releases/download/${VERSION}/${TARBALL}"
          tar -xf "$TARBALL"
          echo "$PWD/llvm-mingw-${VERSION}-msvcrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Fetch dependencies
        run: make deps

      - name: Build
        run: make

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: wininet.dll
          path: build/wininet.dll

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: build/wininet.dll
